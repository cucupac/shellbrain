name: Write Validation Real Embedding Smoke

on:
  workflow_dispatch:

jobs:
  write-validation-real-embedding-smoke:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: shellbrain
          POSTGRES_USER: shellbrain
          POSTGRES_PASSWORD: shellbrain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shellbrain -d memory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SHELLBRAIN_DB_DSN: postgresql+psycopg://shellbrain:shellbrain@localhost:5432/shellbrain
      SHELLBRAIN_DB_DSN_TEST: postgresql+psycopg://shellbrain:shellbrain@localhost:5432/shellbrain
      HF_HOME: ${{ github.workspace }}/.cache/huggingface

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache embedding model downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/huggingface
          key: ${{ runner.os }}-sentence-transformers-${{ hashFiles('requirements.txt', 'shellbrain/config/defaults/runtime.yaml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run real embedding smoke
        run: python -m pytest -q tests/operations/create/execution/embeddings/test_create_embedding_persistence.py -m real_embedding
