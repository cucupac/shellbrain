name: CI

on:
  push:
  pull_request:

jobs:
  write-validation:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: memory
          POSTGRES_USER: memory
          POSTGRES_PASSWORD: memory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memory -d memory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MEMORY_DB_DSN: postgresql+psycopg://memory:memory@localhost:5432/memory
      MEMORY_DB_DSN_TEST: postgresql+psycopg://memory:memory@localhost:5432/memory

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run write validation tests
        run: ./scripts/run_write_validation_tests

      - name: Add visualization report to summary
        if: always()
        run: |
          REPORT="tests/visualization/artifacts/write_validation_status.md"
          if [ -f "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Visualization report not found: $REPORT" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload visualization report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: write-validation-status-report
          path: tests/visualization/artifacts/write_validation_status.md
          if-no-files-found: warn
