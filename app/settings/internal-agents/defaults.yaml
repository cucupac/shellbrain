# Default model/runtime settings for Shellbrain inner agents.
build_context:
  strategy: deterministic_synthesis
  provider: auto
  model: gpt-5.4-mini
  reasoning: low
  timeout_seconds: 90
  max_private_reads: 3
  max_brief_tokens: 1800

build_knowledge:
  provider: auto
  model: gpt-5.4-mini
  reasoning: xhigh
  timeout_seconds: 600
  max_shellbrain_reads: 8
  max_code_files: 24
  max_write_commands: 20
  idle_stable_seconds: 900
  running_run_stale_seconds: 3600

teach:
  provider: auto
  model: gpt-5.4-mini
  reasoning: medium
  timeout_seconds: 600
  max_shellbrain_reads: 6
  max_code_files: 5
  max_write_commands: 12

wiki_summary:
  provider: auto
  model: gpt-5.4-mini
  reasoning: medium
  timeout_seconds: 120
  prompt_version: wiki-summary.v1
  max_summary_chars: 900
  running_refresh_stale_seconds: 3600
  startup_batch_limit: 20
  periodic_batch_limit: 5
  periodic_seconds: 300

providers:
  codex:
    command: codex
    model: gpt-5.4-mini
  claude:
    command: claude
    model: sonnet
