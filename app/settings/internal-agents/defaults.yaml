# Default model/runtime settings for Shellbrain inner agents.
build_context:
  provider: codex
  model: gpt-5.4-mini
  reasoning: low
  timeout_seconds: 90
  max_private_reads: 3
  max_candidate_tokens: 10000
  max_brief_tokens: 1800

build_knowledge:
  provider: codex
  model: gpt-5.4
  reasoning: medium
  timeout_seconds: 180
  max_shellbrain_reads: 8
  max_code_files: 24
  max_write_commands: 20
  idle_stable_seconds: 900
  running_run_stale_seconds: 3600

providers:
  codex:
    command: codex
    working_directory: repo_root
    allow_shellbrain_cli: true
