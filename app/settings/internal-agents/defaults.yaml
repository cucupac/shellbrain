# Default model/runtime settings for Shellbrain inner agents.
build_context:
  enabled: true
  provider: codex
  model: gpt-5.4-mini
  reasoning: low
  timeout_seconds: 90
  max_private_reads: 3
  max_candidate_tokens: 10000
  max_brief_tokens: 1800
  fallback: deterministic

build_knowledge:
  enabled: false
  provider: codex
  model: gpt-5.4
  reasoning: medium
  timeout_seconds: 180
  max_private_reads: 0
  max_candidate_tokens: 20000
  max_brief_tokens: 4000
  fallback: disabled

providers:
  codex:
    command: codex
    working_directory: repo_root
    allow_unbounded_cli: false
