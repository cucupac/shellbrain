# Default model/runtime settings for Shellbrain inner agents.
build_context:
  provider: codex
  model: gpt-5.4-mini
  reasoning: low
  timeout_seconds: 90
  max_private_reads: 3
  max_candidate_tokens: 10000
  max_brief_tokens: 1800

build_knowledge:
  provider: codex
  model: gpt-5.4
  reasoning: medium
  timeout_seconds: 180
  max_private_reads: 0
  max_candidate_tokens: 20000
  max_brief_tokens: 4000

providers:
  codex:
    command: codex
    working_directory: repo_root
    allow_shellbrain_cli: true
