# Default model/runtime settings for Shellbrain inner agents.
build_context:
  strategy: deterministic_synthesis
  provider: codex
  model: gpt-5.4-mini
  reasoning: medium
  timeout_seconds: 90
  max_private_reads: 3
  max_brief_tokens: 1800

build_knowledge:
  provider: codex
  model: gpt-5.4-mini
  reasoning: xhigh
  timeout_seconds: 600
  max_shellbrain_reads: 8
  max_code_files: 24
  max_write_commands: 20
  idle_stable_seconds: 900
  running_run_stale_seconds: 3600

teach:
  provider: codex
  model: gpt-5.4-mini
  reasoning: medium
  timeout_seconds: 600
  max_shellbrain_reads: 6
  max_code_files: 5
  max_write_commands: 12

providers:
  codex:
    command: codex
