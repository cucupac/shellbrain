<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory System Architecture Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    color: #c8ccd4;
    height: 100vh;
    overflow: hidden;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
  }

  .sidebar {
    background: #12121a;
    border-right: 1px solid #1e1e2e;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .sidebar h1 {
    font-size: 14px;
    font-weight: 600;
    color: #e8e8f0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .sidebar h2 {
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .section { margin-bottom: 4px; }

  .preset-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }

  .preset-btn {
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    color: #9ca3af;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .preset-btn:hover { background: #22223a; color: #e0e0e8; }
  .preset-btn.active { background: #2563eb22; border-color: #2563eb; color: #60a5fa; }

  .toggle-group { display: flex; flex-direction: column; gap: 2px; }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .toggle-row:hover { background: #1a1a2e; }

  .toggle-row input[type="checkbox"] { display: none; }

  .toggle-indicator {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 2px solid #444;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .toggle-row input:checked + .toggle-indicator {
    border-color: currentColor;
    background: currentColor;
  }

  .toggle-row input:checked + .toggle-indicator::after {
    content: '\2713';
    color: #0a0a0f;
    font-size: 10px;
    font-weight: 700;
  }

  .toggle-label {
    font-size: 12px;
    color: #9ca3af;
    flex: 1;
  }

  .toggle-row input:checked ~ .toggle-label { color: #d1d5db; }

  .toggle-count {
    font-size: 10px;
    color: #555;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .main-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #12121a;
    border-bottom: 1px solid #1e1e2e;
  }

  .toolbar .view-btn {
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    color: #9ca3af;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .toolbar .view-btn:hover { background: #22223a; color: #e0e0e8; }
  .toolbar .view-btn.active { background: #2563eb22; border-color: #2563eb; color: #60a5fa; }

  .toolbar .spacer { flex: 1; }

  .zoom-controls {
    display: flex;
    gap: 4px;
  }

  .zoom-btn {
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    color: #9ca3af;
    width: 28px;
    height: 28px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .zoom-btn:hover { background: #22223a; color: #e0e0e8; }

  .canvas-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(circle at 50% 50%, #0f0f1a 0%, #0a0a0f 100%);
  }

  svg.diagram {
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  svg.diagram:active { cursor: grabbing; }

  .node-group { cursor: pointer; }

  .node-rect {
    rx: 6;
    ry: 6;
    stroke-width: 1.5;
    transition: filter 0.15s, stroke-width 0.15s;
  }

  .node-group:hover .node-rect {
    filter: brightness(1.2);
    stroke-width: 2.5;
  }

  .node-group.dimmed { opacity: 0.15; }
  .node-group.highlighted .node-rect {
    stroke-width: 3;
    filter: brightness(1.3) drop-shadow(0 0 8px currentColor);
  }

  .node-title {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    fill: #e8e8f0;
    pointer-events: none;
  }

  .node-subtitle {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 9px;
    fill: #6b7280;
    pointer-events: none;
  }

  .node-badge {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 8px;
    fill: #0a0a0f;
    font-weight: 700;
    pointer-events: none;
  }

  .connection-line {
    fill: none;
    stroke-width: 1.5;
    transition: opacity 0.15s;
  }

  .connection-line.dimmed { opacity: 0.06; }
  .connection-line.highlighted { stroke-width: 2.5; }

  .connection-label {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 9px;
    fill: #555;
    pointer-events: none;
  }

  .legend {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: #12121acc;
    backdrop-filter: blur(8px);
    border: 1px solid #1e1e2e;
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: #6b7280;
  }

  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid #333;
  }

  .legend-line {
    width: 20px;
    height: 2px;
    border-radius: 1px;
  }

  .detail-panel {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 300px;
    background: #12121acc;
    backdrop-filter: blur(12px);
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    padding: 16px;
    display: none;
    font-size: 12px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }

  .detail-panel.visible { display: block; }

  .detail-panel h3 {
    font-size: 14px;
    color: #e8e8f0;
    margin-bottom: 4px;
  }

  .detail-panel .detail-category {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .detail-panel .detail-desc {
    color: #9ca3af;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .detail-panel .detail-fields {
    margin-bottom: 12px;
  }

  .detail-panel .detail-field {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid #1a1a2e;
  }

  .detail-panel .detail-field-name {
    color: #6b7280;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
  }

  .detail-panel .detail-field-val {
    color: #c8ccd4;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
  }

  .detail-panel .close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    color: #555;
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
  }

  .detail-panel .close-btn:hover { color: #aaa; }

  .detail-panel .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    margin-right: 4px;
    margin-bottom: 4px;
  }

  .tag-essential { background: #166534; color: #86efac; }
  .tag-important { background: #1e3a5f; color: #7dd3fc; }
  .tag-deferrable { background: #713f12; color: #fde68a; }
  .tag-speculative { background: #7f1d1d; color: #fca5a5; }

  .prompt-bar {
    background: #12121a;
    border-top: 1px solid #1e1e2e;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .prompt-text {
    flex: 1;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    color: #6b7280;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .copy-btn {
    background: #2563eb;
    border: none;
    color: #fff;
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background 0.15s;
  }

  .copy-btn:hover { background: #3b82f6; }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }

  .divider {
    height: 1px;
    background: #1e1e2e;
    margin: 4px 0;
  }

  .note {
    font-size: 10px;
    color: #4b5563;
    line-height: 1.4;
    padding: 6px 8px;
    background: #1a1a2e44;
    border-radius: 4px;
    border-left: 2px solid #333;
  }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div>
      <h1>Memory System</h1>
      <div class="note">Architecture explorer. Click nodes for details. Toggle layers to focus.</div>
    </div>

    <div class="section">
      <h2>View</h2>
      <div class="preset-row" id="view-presets"></div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <h2>Layers</h2>
      <div class="toggle-group" id="layer-toggles"></div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <h2>Connections</h2>
      <div class="toggle-group" id="conn-toggles"></div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <h2>Priority Filter</h2>
      <div class="toggle-group" id="priority-toggles"></div>
    </div>

    <div class="divider"></div>

    <div class="section" id="comments-section" style="display:none">
      <h2>Notes (<span id="comment-count">0</span>)</h2>
      <div id="comments-list"></div>
    </div>
  </div>

  <div class="main-area">
    <div class="toolbar">
      <button class="view-btn active" data-view="ontology">Data Model</button>
      <button class="view-btn" data-view="read-pipeline">Read Pipeline</button>
      <button class="view-btn" data-view="write-pipeline">Write Pipeline</button>
      <button class="view-btn" data-view="layers">Arch Layers</button>
      <div class="spacer"></div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">+</button>
        <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
        <button class="zoom-btn" onclick="zoomReset()">R</button>
      </div>
    </div>

    <div class="canvas-container">
      <svg class="diagram" id="svg"></svg>
      <div class="legend" id="legend"></div>
      <div class="detail-panel" id="detail-panel">
        <button class="close-btn" onclick="closeDetail()">&times;</button>
        <div id="detail-content"></div>
      </div>
    </div>

    <div class="prompt-bar">
      <div class="prompt-text" id="prompt-text">Click components to add notes. Toggle layers to explore.</div>
      <button class="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
    </div>
  </div>
</div>

<script>
// ─── Color palette ────────────────────────────────────────────
const C = {
  core:       { fill: '#1a2744', stroke: '#3b82f6', text: '#93c5fd' },
  links:      { fill: '#1a3328', stroke: '#22c55e', text: '#86efac' },
  episodic:   { fill: '#2a1f3d', stroke: '#a855f7', text: '#c4b5fd' },
  evidence:   { fill: '#2d2215', stroke: '#f59e0b', text: '#fcd34d' },
  derived:    { fill: '#1f2937', stroke: '#6b7280', text: '#9ca3af' },
  interface:  { fill: '#1a2233', stroke: '#06b6d4', text: '#67e8f9' },
  pipeline:   { fill: '#1c1917', stroke: '#f97316', text: '#fdba74' },
  infra:      { fill: '#1a1a2e', stroke: '#6366f1', text: '#a5b4fc' },
};

const CONN_COLORS = {
  fk:          '#3b82f6',
  link:        '#22c55e',
  evidence:    '#f59e0b',
  dataflow:    '#06b6d4',
  expansion:   '#a855f7',
  derived:     '#6b7280',
};

// ─── Ontology view data ───────────────────────────────────────
const ontologyNodes = [
  // Core memories
  { id: 'memories', label: 'memories', subtitle: '6 kinds, immutable', x: 480, y: 40, w: 160, h: 50, layer: 'core', priority: 'essential',
    desc: 'Core immutable memory records. Each has kind, scope (repo/global), text, create_confidence. Append-only.',
    fields: { id: 'TEXT PK', repo_id: 'TEXT', scope: 'repo|global', kind: '6 enum values', text: 'TEXT', create_confidence: 'REAL [0,1]', archived: 'INTEGER', created_at: 'TIMESTAMP' }},

  { id: 'mem-problem', label: 'problem', subtitle: 'kind', x: 60, y: 160, w: 120, h: 42, layer: 'core', priority: 'essential',
    desc: 'A problem encountered during work. Anchors solutions and failed tactics.' },
  { id: 'mem-solution', label: 'solution', subtitle: 'kind', x: 220, y: 160, w: 120, h: 42, layer: 'core', priority: 'essential',
    desc: 'A successful approach to a problem. Linked via problem_attempts.' },
  { id: 'mem-failed', label: 'failed_tactic', subtitle: 'kind', x: 380, y: 160, w: 130, h: 42, layer: 'core', priority: 'essential',
    desc: 'An approach that was tried and failed. Prevents repeating mistakes across sessions.' },
  { id: 'mem-fact', label: 'fact', subtitle: 'kind', x: 550, y: 160, w: 120, h: 42, layer: 'core', priority: 'essential',
    desc: 'A factual observation about the codebase or domain. Can be superseded via fact_updates chain.' },
  { id: 'mem-pref', label: 'preference', subtitle: 'kind', x: 710, y: 160, w: 120, h: 42, layer: 'core', priority: 'essential',
    desc: 'User-stated preference. Evidence may cite user messages rather than code.' },
  { id: 'mem-change', label: 'change', subtitle: 'kind', x: 870, y: 160, w: 120, h: 42, layer: 'core', priority: 'essential',
    desc: 'Records that something changed. Used in fact_updates chains to link old_fact → change → new_fact.' },

  // Structural links — row 3
  { id: 'problem-attempts', label: 'problem_attempts', subtitle: 'problem ↔ solution|failed_tactic', x: 100, y: 290, w: 220, h: 50, layer: 'links', priority: 'essential',
    desc: 'Links problems to their solutions and failed tactics with a role column. Core experiential structure.',
    fields: { problem_id: 'FK → memories', attempt_id: 'FK → memories', role: 'solution|failed_tactic' }},
  { id: 'fact-updates', label: 'fact_updates', subtitle: 'old_fact → change → new_fact', x: 560, y: 290, w: 210, h: 50, layer: 'links', priority: 'essential',
    desc: 'Immutable chain links modeling fact evolution. Truth is the snapshot view, not a mutable score.',
    fields: { old_fact_id: 'FK → memories (fact)', change_id: 'FK → memories (change)', new_fact_id: 'FK → memories (fact)' }},

  // Embeddings — row 3 right
  { id: 'mem-embeddings', label: 'memory_embeddings', subtitle: 'pgvector cache', x: 860, y: 290, w: 170, h: 46, layer: 'derived', priority: 'essential',
    desc: 'Cached vector embeddings for semantic retrieval. One per memory. Derived/rebuildable.',
    fields: { memory_id: 'FK', model: 'TEXT', dim: 'INTEGER', vector: 'VECTOR' }},

  // Association + utility — row 4
  { id: 'assoc-edges', label: 'association_edges', subtitle: 'depends_on | associated_with', x: 60, y: 420, w: 210, h: 50, layer: 'links', priority: 'important',
    desc: 'Typed directed edges between memories. Agent-authored (depends_on, associated_with) or implicit co-activation. Preserves structural relationships across sessions.',
    fields: { from_memory_id: 'FK', to_memory_id: 'FK', relation_type: 'depends_on|associated_with', source_mode: 'agent|implicit|mixed', state: 'tentative|confirmed|deprecated', strength: 'REAL [0,1]' }},
  { id: 'utility-obs', label: 'utility_observations', subtitle: 'memory × problem → vote', x: 400, y: 420, w: 200, h: 50, layer: 'links', priority: 'deferrable',
    desc: 'Contextual utility feedback. Records how helpful a memory was for a specific problem. Powers the weak global utility prior.',
    fields: { memory_id: 'FK', problem_id: 'FK (kind=problem)', vote: 'REAL [-1,1]' }},

  // Evidence — row 4 right
  { id: 'evidence-refs', label: 'evidence_refs', subtitle: 'canonical ref pointers', x: 720, y: 420, w: 170, h: 50, layer: 'evidence', priority: 'essential',
    desc: 'Canonical evidence references. Deduplicated by (repo_id, ref). Points to episode events or external sources.',
    fields: { ref: 'TEXT (pointer format TBD)', repo_id: 'TEXT' }},

  // Row 5 — observation/evidence junction tables
  { id: 'assoc-obs', label: 'association_observations', subtitle: 'reinforcement events', x: 60, y: 550, w: 210, h: 50, layer: 'links', priority: 'deferrable',
    desc: 'Immutable observations that reinforce or weaken edges. Powers implicit co-activation learning. Each has valence [-1,1] and salience.',
    fields: { edge_id: 'FK → assoc_edges', source: 'agent|implicit|feedback', valence: 'REAL [-1,1]', salience: 'REAL [0,1]' }},
  { id: 'assoc-edge-ev', label: 'association_edge_evidence', subtitle: 'edge ↔ evidence', x: 340, y: 550, w: 210, h: 46, layer: 'evidence', priority: 'deferrable',
    desc: 'Many-to-many link between association edges and evidence references.' },
  { id: 'memory-evidence', label: 'memory_evidence', subtitle: 'memory ↔ evidence', x: 720, y: 550, w: 170, h: 46, layer: 'evidence', priority: 'essential',
    desc: 'Many-to-many link. Every created memory must have ≥1 evidence ref.' },

  // Row 6 — episodic layer + derived views
  { id: 'v-fact-snap', label: 'current_fact_snapshot', subtitle: 'view: latest facts', x: 60, y: 700, w: 190, h: 46, layer: 'derived', priority: 'essential',
    desc: 'Facts not superseded by any fact_update chain. This IS current truth.' },
  { id: 'v-utility', label: 'global_utility', subtitle: 'view: avg vote/memory', x: 290, y: 700, w: 170, h: 46, layer: 'derived', priority: 'deferrable',
    desc: 'Computed global utility prior. AVG(vote) per memory. Used only as weak late-stage tie-breaker.' },
  { id: 'episode-events', label: 'episode_events', subtitle: 'immutable event stream', x: 500, y: 700, w: 180, h: 50, layer: 'episodic', priority: 'important',
    desc: 'One row per message/tool call. Ordered by (episode_id, seq). Source is user/assistant/tool/system.',
    fields: { episode_id: 'FK', seq: 'INTEGER (unique per ep)', source: 'user|assistant|tool|system', content: 'TEXT (shape TBD)' }},
  { id: 'episodes', label: 'episodes', subtitle: 'work session container', x: 720, y: 700, w: 160, h: 50, layer: 'episodic', priority: 'important',
    desc: 'Each episode is one work session (chat thread or problem cluster). Has lifecycle status, title, objective.',
    fields: { thread_id: 'TEXT', title: 'TEXT', objective: 'TEXT', status: 'active|closed|archived' }},
  { id: 'session-xfer', label: 'session_transfers', subtitle: 'cross-session handoff', x: 920, y: 700, w: 180, h: 50, layer: 'episodic', priority: 'deferrable',
    desc: 'Tracks handoffs between episodes: message_handoff, context_summary, task_split, task_merge.',
    fields: { from_episode_id: 'FK', to_episode_id: 'FK', event_id: 'FK', transfer_kind: '4 enum values' }},
];

const ontologyConns = [
  // Kind instances — no labels to avoid clutter
  { from: 'memories', to: 'mem-problem', type: 'fk', label: '' },
  { from: 'memories', to: 'mem-solution', type: 'fk', label: '' },
  { from: 'memories', to: 'mem-failed', type: 'fk', label: '' },
  { from: 'memories', to: 'mem-fact', type: 'fk', label: '' },
  { from: 'memories', to: 'mem-pref', type: 'fk', label: '' },
  { from: 'memories', to: 'mem-change', type: 'fk', label: '' },

  // Structural links
  { from: 'mem-problem', to: 'problem-attempts', type: 'link', label: 'problem_id' },
  { from: 'mem-solution', to: 'problem-attempts', type: 'link', label: 'attempt' },
  { from: 'mem-failed', to: 'problem-attempts', type: 'link', label: 'attempt' },

  { from: 'mem-fact', to: 'fact-updates', type: 'link', label: 'old / new' },
  { from: 'mem-change', to: 'fact-updates', type: 'link', label: 'change_id' },

  // Associations
  { from: 'memories', to: 'assoc-edges', type: 'link', label: 'from / to' },
  { from: 'assoc-edges', to: 'assoc-obs', type: 'fk', label: '' },
  { from: 'assoc-edges', to: 'assoc-edge-ev', type: 'evidence', label: '' },

  // Utility
  { from: 'memories', to: 'utility-obs', type: 'fk', label: '' },
  { from: 'mem-problem', to: 'utility-obs', type: 'fk', label: '' },

  // Evidence
  { from: 'memories', to: 'memory-evidence', type: 'evidence', label: '' },
  { from: 'evidence-refs', to: 'memory-evidence', type: 'evidence', label: '' },
  { from: 'evidence-refs', to: 'assoc-edge-ev', type: 'evidence', label: '' },
  { from: 'episode-events', to: 'evidence-refs', type: 'evidence', label: 'event ref' },

  // Episodic
  { from: 'episodes', to: 'episode-events', type: 'fk', label: '' },
  { from: 'episodes', to: 'session-xfer', type: 'fk', label: '' },

  // Embeddings
  { from: 'memories', to: 'mem-embeddings', type: 'derived', label: '' },

  // Derived views
  { from: 'mem-fact', to: 'v-fact-snap', type: 'derived', label: '' },
  { from: 'fact-updates', to: 'v-fact-snap', type: 'derived', label: '' },
  { from: 'utility-obs', to: 'v-utility', type: 'derived', label: '' },
];

// ─── SVG setup ────────────────────────────────────────────────
const svg = document.getElementById('svg');
let svgGroup;

function initSVG() {
  svg.innerHTML = '';

  // Arrowhead markers
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  Object.entries(CONN_COLORS).forEach(([type, color]) => {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', `arrow-${type}`);
    marker.setAttribute('markerWidth', '8');
    marker.setAttribute('markerHeight', '6');
    marker.setAttribute('refX', '7');
    marker.setAttribute('refY', '3');
    marker.setAttribute('orient', 'auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '0 0, 8 3, 0 6');
    poly.setAttribute('fill', color);
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
  svg.appendChild(defs);

  svgGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svgGroup.setAttribute('id', 'pan-group');
  svg.appendChild(svgGroup);
}

// ─── Rendering ────────────────────────────────────────────────
function getNodeCenter(node) {
  return { x: node.x + node.w / 2, y: node.y + node.h / 2 };
}

function getEdgePoint(fromNode, toNode) {
  const fc = getNodeCenter(fromNode);
  const tc = getNodeCenter(toNode);
  const dx = tc.x - fc.x;
  const dy = tc.y - fc.y;
  const angle = Math.atan2(dy, dx);

  function clampToRect(cx, cy, w, h, a) {
    const hw = w / 2, hh = h / 2;
    const tanA = Math.tan(a);
    let ex, ey;
    if (Math.abs(Math.cos(a)) * hh > Math.abs(Math.sin(a)) * hw) {
      ex = Math.sign(Math.cos(a)) * hw;
      ey = ex * tanA;
    } else {
      ey = Math.sign(Math.sin(a)) * hh;
      ex = ey / tanA;
    }
    return { x: cx + ex, y: cy + ey };
  }

  const from = clampToRect(fc.x, fc.y, fromNode.w, fromNode.h, angle);
  const to = clampToRect(tc.x, tc.y, toNode.w, toNode.h, angle + Math.PI);
  return { from, to };
}

function render() {
  initSVG();
  const viewData = VIEWS[state.view];
  const nodes = viewData.nodes;
  const conns = viewData.conns;
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  const visibleLayers = state.layers;
  const visibleConns = state.conns;
  const visiblePriority = state.priority;

  // Draw connections
  conns.forEach(c => {
    const fromNode = nodeMap[c.from];
    const toNode = nodeMap[c.to];
    if (!fromNode || !toNode) return;

    const fromVis = visibleLayers[fromNode.layer] && visiblePriority[fromNode.priority];
    const toVis = visibleLayers[toNode.layer] && visiblePriority[toNode.priority];
    const connVis = visibleConns[c.type];

    if (!connVis) return;

    const pts = getEdgePoint(fromNode, toNode);
    const mx = (pts.from.x + pts.to.x) / 2;
    const my = (pts.from.y + pts.to.y) / 2;
    const dx = pts.to.x - pts.from.x;
    const dy = pts.to.y - pts.from.y;
    const offset = Math.min(30, Math.sqrt(dx*dx + dy*dy) * 0.15);
    const cx = mx + (dy > 0 ? -1 : 1) * offset * 0.3;
    const cy = my + (dx > 0 ? 1 : -1) * offset * 0.3;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${pts.from.x} ${pts.from.y} Q ${cx} ${cy} ${pts.to.x} ${pts.to.y}`);
    path.setAttribute('stroke', CONN_COLORS[c.type] || '#555');
    path.setAttribute('marker-end', `url(#arrow-${c.type})`);
    path.classList.add('connection-line');
    if (CONN_META[c.type]?.dash) path.setAttribute('stroke-dasharray', CONN_META[c.type].dash);

    const dimmed = !fromVis || !toVis;
    if (dimmed) path.classList.add('dimmed');
    if (state.selected && (c.from === state.selected || c.to === state.selected)) {
      path.classList.remove('dimmed');
      path.classList.add('highlighted');
    }

    svgGroup.appendChild(path);

    if (c.label && !dimmed) {
      const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lbl.setAttribute('x', cx);
      lbl.setAttribute('y', cy - 6);
      lbl.setAttribute('text-anchor', 'middle');
      lbl.classList.add('connection-label');
      lbl.textContent = c.label;
      svgGroup.appendChild(lbl);
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const vis = visibleLayers[n.layer] && visiblePriority[n.priority];
    const colors = C[n.layer] || C.core;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('node-group');
    if (!vis) g.classList.add('dimmed');
    if (state.selected === n.id) g.classList.add('highlighted');

    // Priority border
    const prioColor = PRIORITY_META[n.priority]?.color || '#555';

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', n.x);
    rect.setAttribute('y', n.y);
    rect.setAttribute('width', n.w);
    rect.setAttribute('height', n.h);
    rect.setAttribute('fill', colors.fill);
    rect.setAttribute('stroke', colors.stroke);
    rect.classList.add('node-rect');
    g.appendChild(rect);

    // Priority indicator (small dot)
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', n.x + n.w - 8);
    dot.setAttribute('cy', n.y + 8);
    dot.setAttribute('r', 4);
    dot.setAttribute('fill', prioColor);
    g.appendChild(dot);

    const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    title.setAttribute('x', n.x + 10);
    title.setAttribute('y', n.y + 20);
    title.classList.add('node-title');
    title.textContent = n.label;
    g.appendChild(title);

    if (n.subtitle) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('x', n.x + 10);
      sub.setAttribute('y', n.y + 34);
      sub.classList.add('node-subtitle');
      sub.textContent = n.subtitle;
      g.appendChild(sub);
    }

    g.addEventListener('click', (e) => {
      e.stopPropagation();
      selectNode(n);
    });

    svgGroup.appendChild(g);
  });

  updateTransform();
  updateLegend();
  updatePrompt();
}

function updateTransform() {
  svgGroup.setAttribute('transform', `translate(${state.panX}, ${state.panY}) scale(${state.zoom})`);
}

function selectNode(node) {
  state.selected = node.id;
  showDetail(node);
  render();
}

function clearSelection() {
  state.selected = null;
  document.getElementById('detail-panel').classList.remove('visible');
  render();
}

// ─── Detail panel ─────────────────────────────────────────────
function showDetail(node) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const colors = C[node.layer] || C.core;
  const prioMeta = PRIORITY_META[node.priority];

  let html = `<h3 style="color:${colors.text}">${node.label}</h3>`;
  html += `<div class="detail-category" style="color:${colors.text}">${LAYER_META[node.layer]?.label || node.layer}</div>`;
  html += `<div style="margin-bottom:10px"><span class="tag tag-${node.priority}">${prioMeta.label}</span></div>`;
  html += `<div class="detail-desc">${node.desc || ''}</div>`;

  if (node.fields) {
    html += '<div class="detail-fields">';
    Object.entries(node.fields).forEach(([k, v]) => {
      html += `<div class="detail-field"><span class="detail-field-name">${k}</span><span class="detail-field-val">${v}</span></div>`;
    });
    html += '</div>';
  }

  // Connected nodes
  const viewData = VIEWS[state.view];
  const connected = viewData.conns
    .filter(c => c.from === node.id || c.to === node.id)
    .map(c => {
      const otherId = c.from === node.id ? c.to : c.from;
      const other = viewData.nodes.find(n => n.id === otherId);
      const dir = c.from === node.id ? '→' : '←';
      return other ? `${dir} ${other.label}` : null;
    })
    .filter(Boolean);

  if (connected.length) {
    html += '<div style="margin-top:8px"><div style="font-size:10px;color:#555;margin-bottom:4px">CONNECTED TO</div>';
    connected.forEach(c => {
      html += `<div style="font-size:11px;color:#9ca3af;padding:2px 0">${c}</div>`;
    });
    html += '</div>';
  }

  // Add comment button
  html += `<div style="margin-top:12px"><button onclick="addComment('${node.id}')" style="background:#1a1a2e;border:1px solid #2a2a3e;color:#9ca3af;padding:5px 12px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;">Add Note</button></div>`;

  content.innerHTML = html;
  panel.classList.add('visible');
}

function closeDetail() {
  state.selected = null;
  document.getElementById('detail-panel').classList.remove('visible');
  render();
}

// ─── Comments ─────────────────────────────────────────────────
function addComment(nodeId) {
  const text = prompt('Add a note about this component:');
  if (!text) return;
  const viewData = VIEWS[state.view];
  const node = viewData.nodes.find(n => n.id === nodeId);
  state.comments.push({
    id: Date.now(),
    view: state.view,
    target: nodeId,
    targetLabel: node?.label || nodeId,
    text,
  });
  updateComments();
  updatePrompt();
}

function removeComment(id) {
  state.comments = state.comments.filter(c => c.id !== id);
  updateComments();
  updatePrompt();
}

function updateComments() {
  const section = document.getElementById('comments-section');
  const list = document.getElementById('comments-list');
  const count = document.getElementById('comment-count');

  if (state.comments.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  count.textContent = state.comments.length;
  list.innerHTML = state.comments.map(c => `
    <div style="padding:6px 8px;background:#1a1a2e;border-radius:4px;margin-bottom:4px;font-size:11px;">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:#e0e0e8;font-weight:600">${c.targetLabel}</span>
        <button onclick="removeComment(${c.id})" style="background:none;border:none;color:#555;cursor:pointer;font-size:12px">&times;</button>
      </div>
      <div style="color:#6b7280;margin-top:2px">${c.text}</div>
    </div>
  `).join('');
}

// ─── Legend ───────────────────────────────────────────────────
function updateLegend() {
  const legend = document.getElementById('legend');
  const viewData = VIEWS[state.view];

  const usedLayers = new Set(viewData.nodes.map(n => n.layer));
  const usedConns = new Set(viewData.conns.map(c => c.type));

  let html = '';
  Object.entries(LAYER_META).forEach(([key, meta]) => {
    if (!usedLayers.has(key)) return;
    html += `<div class="legend-item"><div class="legend-swatch" style="background:${C[key]?.fill || '#1a1a2e'};border-color:${meta.color}"></div>${meta.label}</div>`;
  });

  Object.entries(PRIORITY_META).forEach(([key, meta]) => {
    html += `<div class="legend-item"><div style="width:8px;height:8px;border-radius:50%;background:${meta.color}"></div>${meta.label}</div>`;
  });

  legend.innerHTML = html;
}

// ─── Prompt ───────────────────────────────────────────────────
function updatePrompt() {
  const el = document.getElementById('prompt-text');
  const viewData = VIEWS[state.view];

  const hiddenLayers = Object.entries(state.layers).filter(([k, v]) => !v).map(([k]) => LAYER_META[k]?.label || k);
  const hiddenPrios = Object.entries(state.priority).filter(([k, v]) => !v).map(([k]) => PRIORITY_META[k]?.label || k);

  let parts = [];
  parts.push(`Viewing: ${state.view.replace('-', ' ')}.`);

  if (hiddenLayers.length) parts.push(`Hidden layers: ${hiddenLayers.join(', ')}.`);
  if (hiddenPrios.length) parts.push(`Filtered out: ${hiddenPrios.join(', ')}.`);

  if (state.comments.length) {
    parts.push('Notes:');
    state.comments.forEach(c => {
      parts.push(`  ${c.targetLabel}: ${c.text}`);
    });
  }

  el.textContent = parts.join(' ');
}

function copyPrompt() {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Prompt', 1500);
  });
}

// ─── Controls ─────────────────────────────────────────────────
function buildControls() {
  // View presets
  const presets = document.getElementById('view-presets');
  const presetDefs = [
    { label: 'Essential Only', fn: () => { state.priority = { essential: true, important: false, deferrable: false, speculative: false }; }},
    { label: 'Ship v1', fn: () => { state.priority = { essential: true, important: true, deferrable: false, speculative: false }; }},
    { label: 'Everything', fn: () => { state.priority = { essential: true, important: true, deferrable: true, speculative: true }; }},
  ];
  presetDefs.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.label;
    btn.addEventListener('click', () => {
      p.fn();
      buildPriorityToggles();
      render();
    });
    presets.appendChild(btn);
  });

  // Layer toggles
  buildLayerToggles();
  buildConnToggles();
  buildPriorityToggles();

  // View buttons
  document.querySelectorAll('.toolbar .view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toolbar .view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.view = btn.dataset.view;
      state.selected = null;
      document.getElementById('detail-panel').classList.remove('visible');
      state.panX = 0;
      state.panY = 0;
      state.zoom = 1;
      render();
    });
  });
}

function buildLayerToggles() {
  const container = document.getElementById('layer-toggles');
  container.innerHTML = '';
  Object.entries(LAYER_META).forEach(([key, meta]) => {
    const viewData = VIEWS[state.view];
    const count = viewData.nodes.filter(n => n.layer === key).length;
    if (count === 0) return;

    const label = document.createElement('label');
    label.className = 'toggle-row';
    label.innerHTML = `
      <input type="checkbox" ${state.layers[key] ? 'checked' : ''}>
      <span class="toggle-indicator" style="color:${meta.color}"></span>
      <span class="toggle-label">${meta.label}</span>
      <span class="toggle-count">${count}</span>
    `;
    label.querySelector('input').addEventListener('change', (e) => {
      state.layers[key] = e.target.checked;
      render();
    });
    container.appendChild(label);
  });
}

function buildConnToggles() {
  const container = document.getElementById('conn-toggles');
  container.innerHTML = '';
  Object.entries(CONN_META).forEach(([key, meta]) => {
    const viewData = VIEWS[state.view];
    const count = viewData.conns.filter(c => c.type === key).length;
    if (count === 0) return;

    const label = document.createElement('label');
    label.className = 'toggle-row';
    label.innerHTML = `
      <input type="checkbox" ${state.conns[key] ? 'checked' : ''}>
      <span class="toggle-indicator" style="color:${meta.color}"></span>
      <span class="toggle-label">${meta.label}</span>
      <span class="toggle-count">${count}</span>
    `;
    label.querySelector('input').addEventListener('change', (e) => {
      state.conns[key] = e.target.checked;
      render();
    });
    container.appendChild(label);
  });
}

function buildPriorityToggles() {
  const container = document.getElementById('priority-toggles');
  container.innerHTML = '';
  Object.entries(PRIORITY_META).forEach(([key, meta]) => {
    const label = document.createElement('label');
    label.className = 'toggle-row';
    label.innerHTML = `
      <input type="checkbox" ${state.priority[key] ? 'checked' : ''}>
      <span class="toggle-indicator" style="color:${meta.color}"></span>
      <span class="toggle-label">${meta.label}</span>
    `;
    label.querySelector('input').addEventListener('change', (e) => {
      state.priority[key] = e.target.checked;
      render();
    });
    container.appendChild(label);
  });
}

// ─── Zoom & Pan ───────────────────────────────────────────────
function zoomIn() { state.zoom = Math.min(3, state.zoom * 1.2); updateTransform(); }
function zoomOut() { state.zoom = Math.max(0.3, state.zoom / 1.2); updateTransform(); }
function zoomReset() { state.zoom = 1; state.panX = 0; state.panY = 0; updateTransform(); }

svg.addEventListener('mousedown', (e) => {
  if (e.target === svg || e.target === svgGroup) {
    state.dragging = true;
    state.dragStart = { x: e.clientX - state.panX, y: e.clientY - state.panY };
    svg.style.cursor = 'grabbing';
  }
});

svg.addEventListener('mousemove', (e) => {
  if (state.dragging) {
    state.panX = e.clientX - state.dragStart.x;
    state.panY = e.clientY - state.dragStart.y;
    updateTransform();
  }
});

svg.addEventListener('mouseup', () => {
  state.dragging = false;
  svg.style.cursor = 'grab';
});

svg.addEventListener('mouseleave', () => {
  state.dragging = false;
  svg.style.cursor = 'grab';
});

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  state.zoom = Math.max(0.3, Math.min(3, state.zoom * delta));
  updateTransform();
});

svg.addEventListener('click', (e) => {
  if (e.target === svg || e.target === svgGroup) {
    clearSelection();
  }
});

// ─── Init ─────────────────────────────────────────────────────
buildControls();
render();
</script>
</body>
</html>
